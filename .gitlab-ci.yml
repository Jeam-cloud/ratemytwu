stages:
  - test

pytest:
  stage: test
  image: python:3.12
  variables:
    TEST_DATABASE_URL: "sqlite:///./test.db"
    SUPABASE_URL: "https://dummy-url.supabase.co" 
  before_script:
    - cd backend
    - pip install -r requirements.txt
  script:
    - pytest

lint:
  stage: test
  image: python:3.12
  before_script:
    - cd backend
    - pip install ruff
  script:
    - ruff check .

frontend-build:
  stage: test
  image: node:20
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build